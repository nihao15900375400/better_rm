[package]
name = "del"
version = "0.1.0"
edition = "2024"

[dependencies]
tar = "0.4"
blake3 = { version = "1.5", features = ["rayon", "std"] }
thiserror = "1.0"
uuid = { version = "1.8", features = ["v4", "fast-rng", "std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
flate2 = { version = "1.0", optional = true }
xz2 = { version = "0.1", optional = true }
bzip2 = { version = "0.4", optional = true }
lz4 = { version = "1.24", optional = true }
zstd = { version = "0.13", optional = true, features = ["zstdmt"] }
chrono = "0.4.44"
colored = "3"
tabled = { version = "0.20", features = ["derive"] }
indicatif = "0.18"
termimad = "0.20"
crossterm = "0.27"
[features]
default = ["gz", "bz2", "zstd", "lz4"]
gz    = ["dep:flate2"]
bz2   = ["dep:bzip2"]
zstd  = ["dep:zstd"]
lz4   = ["dep:lz4"]

[dev-dependencies]
tempfile = "3.10"

[package]
name = "del"
version = "0.2.0"
edition = "2024"

[dependencies]
blake3 = "1.8.5"
bzip2 = "0.6.1"
clap = { version = "4", features = ["derive", "unicode", "wrap_help"] }
dirs = "6.0.0"
flate2 = { version = "1.1.9", features = ["zlib-ng"] }
md-5 = "0.11.0"
minus = { version = "5.6.1", features = ["search", "static_output"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
sha2 = "0.11.0"
tokio = { version = "1", features = ["full"] }
sqlx = { version = "0.8.6", features = ["sqlite", "runtime-tokio-native-tls", "chrono", "macros", "migrate"] }
tar = "0.4.45"
xz2 = "0.1.7"
zstd = { version = "0.13.3", features = ["thin"] }
which = "6.0"
walkdir = "2"